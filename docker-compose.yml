services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
      network: host
      args:
        # Match php-fpm's www-data to the host user so it can write to the
        # bind-mounted volume (storage/, bootstrap/cache). Override per-host
        # with `UID=$(id -u) GID=$(id -g) docker compose ... build` if needed.
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: cognivia_backend      
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    network_mode: host
    depends_on:
      - mysql
      - redis

  # Queue worker — drains jobs pushed onto the queue (currently the queued
  # password-reset mail; the natural home for future async work like AI
  # generation). Reuses the backend image, bind-mount and .env, so it honours
  # the app's QUEUE_CONNECTION and they always agree.
  #
  # Opt-in via the "worker" profile so the default `docker compose up` never
  # starts it: `queue:work` is unsupported on the `sync` driver (the default)
  # and would crash-loop. To run it, set QUEUE_CONNECTION=database (free, uses
  # the existing MySQL) or =redis in backend/.env, then:
  #   docker compose --profile worker up -d
  # --max-time recycles the worker hourly so any leaked memory is reclaimed.
  worker:
    profiles: ["worker"]
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
      network: host
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: cognivia_worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --backoff=5 --max-time=3600
    volumes:
      - ./backend:/var/www
    network_mode: host
    depends_on:
      - mysql
      - redis

  redis:
    image: redis:7-alpine
    container_name: cognivia_redis
    restart: unless-stopped
    # appendonly persists the queue/cache across restarts so a redeploy doesn't
    # drop in-flight jobs. Bound to loopback only — never exposed publicly.
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - cognivia_redis_data:/data
    networks:
      - cognivia_network

  nginx:
    image: nginx:alpine
    container_name: cognivia_nginx
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cognivia_network
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    image: mysql:8.0
    container_name: cognivia_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - cognivia_mysql_data:/var/lib/mysql
    networks:
      - cognivia_network

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    container_name: cognivia_soketi
    restart: unless-stopped
    ports:
      - "127.0.0.1:6001:6001"
      - "127.0.0.1:9601:9601"
    environment:
      SOKETI_DEBUG: "0"
      SOKETI_DEFAULT_APP_ID: "${PUSHER_APP_ID}"
      SOKETI_DEFAULT_APP_KEY: "${PUSHER_APP_KEY}"
      SOKETI_DEFAULT_APP_SECRET: "${PUSHER_APP_SECRET}"
    networks:
      - cognivia_network

networks:
  cognivia_network:
    driver: bridge
    name: cognivia_network
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_icc: "true"

volumes:
  cognivia_mysql_data:
  cognivia_redis_data:
