server {
    listen 3000;
    client_max_body_size 10M;

    add_header X-Frame-Options              "DENY"                              always;
    add_header X-Content-Type-Options       "nosniff"                           always;
    add_header X-XSS-Protection             "1; mode=block"                     always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"   always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' wss: ws: https:; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none';" always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"      always;

    location /ws/ {
        proxy_pass http://soketi:6001/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        proxy_read_timeout    3600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
    }

    
    location /downloads/ {
        root /var/www/public;
        try_files $uri =404;
        # Serve .apk with the Android package MIME type so phones offer
        # to install it instead of rendering it as text.
        types { application/vnd.android.package-archive apk; }
        access_log off;
    }

    location /storage/ {
        root /var/www/public;
        try_files $uri $uri/ =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri @react;
    }

    location @react {
        proxy_pass http://host.docker.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          'upgrade';
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    
    location ~ ^/api {
        root /var/www/public;
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
    }

    
    location ~ \.php$ {
        root /var/www/public;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   host.docker.internal:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        fastcgi_param  REQUEST_URI     $request_uri;
        fastcgi_read_timeout 300;
    }
}
