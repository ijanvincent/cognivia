server {
    listen 3000;
    client_max_body_size 10M;

    # ── ADDED: WebSocket proxy to Soketi ────────────────────────────────
    # What: new /ws location block that proxies WebSocket traffic to Soketi.
    # Why: echo.js sets wsPath: '/ws'. Without this block, the browser's
    # wss://ngrok-domain/ws request falls through to the React proxy which
    # does not speak the Soketi/Pusher protocol. The HTTP 101 Upgrade
    # handshake never completes, Echo never connects, and ForceLogout
    # events are never received — which is the exact bug being fixed.
    location /ws {
        proxy_pass http://soketi:6001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        # Keep long-lived WebSocket connections alive.
        # Default nginx timeout is 60s which would silently kill
        # idle WebSocket connections mid-session.
        proxy_read_timeout    3600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
    }

    # Laravel storage files
    location /storage/ {
        root /var/www/public;
        try_files $uri $uri/ =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # React app (non-API routes)
    location / {
        try_files $uri @react;
    }

    location @react {
        proxy_pass http://host.docker.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          'upgrade';
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Laravel API
    location ~ ^/api {
        root /var/www/public;
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        root /var/www/public;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   backend:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        fastcgi_param  REQUEST_URI     $request_uri;
        fastcgi_read_timeout 300;
    }
}