# Render Blueprint for the CogniVia API.
#
# Deploys backend/ as a free-tier Docker web service. Values marked
# `sync: false` are secrets or instance-specific URLs — Render prompts for
# them when the blueprint is first applied; they never live in git.
#
# Full setup walkthrough: see DEPLOYMENT.md at the repo root.
services:
  - type: web
    name: cognivia-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile.production
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      # --- serversideup/php boot automations -------------------------------
      - key: AUTORUN_ENABLED
        value: "true" # run migrations + storage:link + config cache on boot
      - key: AUTORUN_LARAVEL_MIGRATION_SEED
        value: "true" # DatabaseSeeder only runs the idempotent AdminSeeder

      # --- Application -----------------------------------------------------
      - key: APP_NAME
        value: CogniVia
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false # generate: php artisan key:generate --show
      - key: TRUSTED_PROXIES
        value: "*" # Render's LB CIDR is unpublished; the container is only reachable through it
      - key: APP_URL
        sync: false # this service's URL, e.g. https://cognivia-api.onrender.com
      - key: FRONTEND_URL
        sync: false # the Vercel app URL, e.g. https://cognivia.vercel.app (CORS)
      - key: JWT_SECRET
        sync: false # generate: openssl rand -base64 64 | tr -d '\n='
      - key: ADMIN_SEEDER_EMAIL
        sync: false
      - key: ADMIN_SEEDER_PASSWORD
        sync: false # NOTE: re-applied on every deploy — env is the source of truth

      # --- Database (Aiven free MySQL) --------------------------------------
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/secrets/db-ca.pem # upload Aiven's ca.pem as a Render Secret File

      # --- Drivers ----------------------------------------------------------
      # Cache + sessions are kept on the LOCAL instance filesystem, never the
      # remote Aiven DB. Why: the `throttle` middleware and the login
      # RateLimiter use the cache store on every auth request, and Laravel's
      # web session store is also cache/DB-backed. With CACHE_STORE=database the
      # round-trip to the geographically-remote Aiven free MySQL (~1.5–2.5s per
      # query, measured) was paid 4–6x per register/login — before the request
      # even reached validation. `file` keeps this transient, per-request data
      # on local disk, which is correct for the single free-tier instance and
      # removes those remote round-trips entirely. (Move to `redis` if/when the
      # service is scaled past one instance so the rate-limit bucket is shared.)
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      # No background worker on the free tier, so queued jobs (broadcast
      # events, mail) must run inline. To go async — and to share the
      # rate-limit/session store across multiple instances — provision managed
      # Redis + a worker, then flip QUEUE_CONNECTION/CACHE_STORE/SESSION_DRIVER
      # to `redis` (and add REDIS_* below). Do NOT flip before that infra
      # exists or auth throttling breaks. Full steps: see SCALING.md.
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      # --- Mail (password-reset / forgot-password delivery) -----------------
      # Two walls make SMTP unworkable on Render's free tier:
      #   1. Render BLOCKS outbound SMTP ports 25/465/587
      #      (https://render.com/changelog/free-web-services-will-no-longer-allow-outbound-traffic-to-smtp-ports),
      #      so Gmail SMTP is unreachable from here.
      #   2. An SMTP relay on the allowed port 2525 (e.g. Brevo) connects, but is
      #      NOT authorized to send "From" an @gmail.com address (gmail.com SPF
      #      only authorizes Google). Such messages fail DMARC and are dropped —
      #      silently, since the relay still "accepts" the handoff. Nothing
      #      arrives, not even to spam. (Authenticating a custom domain you own
      #      with the relay fixes this, but requires buying a domain.)
      #
      # Solution used here: the "gmail" mailer (App\Mail\Transport\GmailApiTransport)
      # sends via the Gmail API over HTTPS (port 443, which Render does NOT block).
      # This is Google itself sending as the authenticated account — fully
      # SPF/DKIM/DMARC aligned, free, and needs no custom domain. Get the refresh
      # token once locally with `php artisan gmail:authorize` (see DEPLOYMENT.md).
      # MAIL_FROM_ADDRESS must be the authorized Gmail account.
      - key: MAIL_MAILER
        value: gmail
      - key: GMAIL_CLIENT_ID
        sync: false # Google Cloud OAuth client ID
      - key: GMAIL_CLIENT_SECRET
        sync: false # Google Cloud OAuth client secret
      - key: GMAIL_REFRESH_TOKEN
        sync: false # output of `php artisan gmail:authorize`
      - key: MAIL_FROM_ADDRESS
        sync: false # the authorized Gmail address (e.g. you@gmail.com)
      - key: MAIL_FROM_NAME
        value: CogniVia

      # --- Realtime (optional — set to "pusher" + fill PUSHER_* to enable) ---
      - key: BROADCAST_CONNECTION
        value: log

      # --- AI (OpenRouter — flashcard generation & answer checking) ---------
      # Required for /api/flashcards/generate and /check-answer. Without these
      # the endpoints fail. OPENROUTER_MODEL must be a model that currently
      # exists (verify at https://openrouter.ai/api/v1/models); ":free" models
      # are rate-limited and unreliable in production.
      - key: OPENROUTER_API_KEY
        sync: false # get a key at https://openrouter.ai/keys
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash

      # --- Error monitoring (Sentry) ----------------------------------------
      # Leave SENTRY_LARAVEL_DSN unset to disable (fully no-op). Set it to the
      # DSN from a free sentry.io project to capture unhandled exceptions.
      # Traces sampling is off so only errors are sent — performance tracing
      # would add overhead the free instance can't spare.
      - key: SENTRY_LARAVEL_DSN
        sync: false # optional; from a free https://sentry.io project
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"
